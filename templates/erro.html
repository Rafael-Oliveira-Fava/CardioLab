{% extends "estrutura_base.html" %}
{% block title %}Erro {{ codigo_erro }} - CardioLab{% endblock %}
{% block conteudo %}
<section class="min-h-[60vh] flex items-center justify-center py-20">
    <div class="text-center">
        <p class="text-8xl font-extrabold text-primary mb-4">{{ codigo_erro }}</p>
        <h1 class="text-3xl font-bold text-dark mb-4">{{ titulo_erro }}</h1>
        <p class="text-gray-500 mb-8 text-lg">{{ mensagem_erro }}</p>
        <a href="{{ url_for('publico.inicio') }}" class="px-8 py-4 bg-primary text-white rounded-2xl font-bold hover:bg-primary-dark transition shadow-lg">Voltar ao Início</a>
    </div>
</section>
{% endblock %}
